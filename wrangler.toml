name = "telegram-verification-bot"
main = "src/worker.bundle.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "telegram_verification"
database_id = "281a317d-1ace-47b2-88f3-7853cb7398dd"

# 环境变量（开发/测试用，生产环境请使用 wrangler secret）
[vars]
TELEGRAM_BOT_TOKEN = "8131509226:AAHBgtGDouwJ6-9FfyLfiA7qFm-2mQ-759s"

# 生产环境使用加密的 secrets（推荐）:
# npx wrangler secret put TELEGRAM_BOT_TOKEN
# npx wrangler secret put WEBHOOK_SECRET

# Workers 资源配置
[build]
command = ""

# 路由配置（可选，如果使用自定义域名）
# routes = [
#   { pattern = "bot.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# 环境配置
[env.production]
name = "telegram-verification-bot"
# vars = { ENVIRONMENT = "production" }

[env.staging]
name = "telegram-verification-bot-staging"
# vars = { ENVIRONMENT = "staging" }
